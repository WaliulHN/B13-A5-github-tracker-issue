<!DOCTYPE html>
<html lang="en">
<head>

   <style>
    * {

    body {

    }

    /* Navbar */

      position: sticky;
      top: 0;
      z-index: 100;
    }

    .navbar-container {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 20px;
      font-weight: 600;
    }

    .navbar-brand i {

    }

    .navbar-right {
      display: flex;

    }

    .navbar-search {

    .navbar-search input {
      width: 300px;
      padding: 6px 12px;
      font-size: 14px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      outline: none;
    }

    .navbar-search input:focus {

    }

     .btn {

      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      font-size: 14px;
      font-weight: 500;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {

    }

    .btn-primary:hover {

    }

    .btn-outline {

      border: 1px solid #d0d7de;
      color: #24292f;
    }

    .btn-outline:hover {

    }

      
    .main-content {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 32px;
    }

    
    .tabs-container {
      background: white;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      padding: 8px;
      margin-bottom: 24px;
      display: flex;
      gap: 4px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      background: transparent;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      color: #57606a;
    }

    .tab-btn:hover {
      background: #f6f8fa;
    }

    .tab-btn.active {
      background: #8250df;
      color: white;
    }

    
    .stats-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding: 16px 0;
    }

    .stats-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .stats-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .stats-text h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .stats-text p {
      font-size: 14px;
      color: #57606a;
    }

    .stats-legend {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 14px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .legend-dot.open {
      background: #2da44e;
    }

    .legend-dot.closed {
      background: #8250df;
    }

    
    .issues-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

      @media (max-width: 1200px) {
      .issues-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 900px) {
      .issues-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      .issues-grid {
        grid-template-columns: 1fr;
      }
    }

       
    .issue-card {
      background: white;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .issue-card:hover {
      box-shadow: 0 3px 6px rgba(27, 31, 36, 0.15);
      transform: translateY(-2px);
    }

    .issue-card.card-open {
      border-top: 3px solid #2da44e;
    }

    .issue-card.card-closed {
      border-top: 3px solid #8250df;
    }

    .issue-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .issue-status {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      flex-shrink: 0;
    }

    .issue-status.open {
      color: #2da44e;
      border: 2px solid #2da44e;
    }

    .issue-status.closed {
      color: #8250df;
      border: 2px solid #8250df;
    }

    .issue-priority {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 12px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .priority-high {
      background: #ffebe9;
      color: #cf222e;
    }

    .priority-medium {
      background: #fff8c5;
      color: #9a6700;
    }

    .priority-low {
      background: #e1effe;
      color: #0969da;
    }

    .issue-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #24292f;
      line-height: 1.4;
    }

    .issue-description {
      font-size: 12px;
      color: #57606a;
      margin-bottom: 12px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .issue-labels {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .label {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 12px;
      border: 1px solid;
    }

    .label-bug {
      background: #ffebe9;
      color: #cf222e;
      border-color: #cf222e;
    }

    .label-help {
      background: #fff8c5;
      color: #9a6700;
      border-color: #d29922;
    }

    .label-enhancement {
      background: #dafbe1;
      color: #1a7f37;
      border-color: #2da44e;
    }

    .label-good-first {
      background: #ffddf0;
      color: #a40e82;
      border-color: #ce5394;
    }

    .issue-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: #57606a;
      padding-top: 12px;
      border-top: 1px solid #d0d7de;
    }

    .issue-author {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .issue-author i {
      font-size: 14px;
    }

   .loading {
      text-align: center;
      padding: 48px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #d0d7de;
      border-top-color: #8250df;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

      .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 8px;
      max-width: 640px;
      width: 100%;
      max-height: 90vh;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid #d0d7de;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 600;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      color: #57606a;
      cursor: pointer;
    }

    .modal-close:hover {
      color: #24292f;
    }

    .modal-body {
      padding: 24px;
      overflow-y: auto;
      max-height: calc(90vh - 140px);
    }

    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid #d0d7de;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .detail-row {
      display: flex;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .detail-label {
      width: 100px;
      font-weight: 600;
      color: #57606a;
      flex-shrink: 0;
    }

    .detail-value {
      flex: 1;
      color: #24292f;

@media (max-width: 768px) {

  }
  
  .navbar-container {

  }

  }

  }

  </style>

<body>

      
  <nav class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">
        <i class="fab fa-github"></i>
        <span>GitHub Issues Tracker</span>
      </div>
      <div class="navbar-right">
        <div class="navbar-search">
          <input type="text" id="searchInput" placeholder="Search issues...">
        </div>
        <button class="btn btn-primary" onclick="logout()">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
      </div>
    </div>
  </nav>

  
  <main class="main-content">
    
    <div class="tabs-container">
      <button class="tab-btn active" data-tab="all" onclick="switchTab('all')">All</button>
      <button class="tab-btn" data-tab="open" onclick="switchTab('open')">Open</button>
      <button class="tab-btn" data-tab="closed" onclick="switchTab('closed')">Closed</button>
    </div>

    
    <div class="stats-header">
      <div class="stats-left">
        <div class="stats-icon">
          <i class="fas fa-layer-group"></i>
        </div>
        <div class="stats-text">
          <h2 id="issueCount">Loading...</h2>
          <p>Track and manage your project issues</p>
        </div>
      </div>
      <div class="stats-legend">
        <div class="legend-item">
          <span class="legend-dot open"></span>
          <span>Open</span>
        </div>
        <div class="legend-item">
          <span class="legend-dot closed"></span>
          <span>Closed</span>
        </div>
      </div>
    </div>

    
    <div class="loading" id="loading">
      <div class="spinner"></div>
    </div>

    
    <div class="issues-grid" id="issuesGrid"></div>
  </main>

  
  <div class="modal" id="issueModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Issue Details</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal()">Close</button>
      </div>
    </div>
  </div>

  <script>
    
    if (localStorage.getItem('isAuthenticated') !== 'true') {
      window.location.href = 'index.html';
    }

    const API_BASE = 'https://phi-lab-server.vercel.app/api/v1/lab';
    let allIssues = [];
    let currentTab = 'all';
    let searchQuery = '';

    
    document.addEventListener('DOMContentLoaded', () => {
      loadIssues();
    });


async function switchTab(tab) {
  currentTab = tab;
  
  
  document.getElementById('loading').style.display = 'block';
  document.getElementById('issuesGrid').style.display = 'none';
  
  
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.remove('active');
    if (btn.dataset.tab === tab) {
      btn.classList.add('active');
    }
  });
  
  
  await new Promise(resolve => setTimeout(resolve, 300));
  
  
  renderIssues(filterIssues());
  
  
  document.getElementById('loading').style.display = 'none';
  document.getElementById('issuesGrid').style.display = 'grid';
}

    async function loadIssues() {
      try {
        document.getElementById('loading').style.display = 'block';
        const response = await fetch(`${API_BASE}/issues`);
        const result = await response.json();
        allIssues = result.data || [];
        
        console.log('Loaded issues:', allIssues.length);
        console.log('Sample issue:', allIssues[0]);
        
        updateStats();
        renderIssues(filterIssues());
      } catch (error) {
        console.error('Error loading issues:', error);
        document.getElementById('issueCount').textContent = 'Error loading issues';
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }

    function filterIssues() {
      console.log('Filtering - Current tab:', currentTab);
      
      let filtered = allIssues;
      
      
      if (currentTab === 'open') {
        filtered = filtered.filter(issue => {
          const isOpen = issue.status === 'open';
          console.log(`Issue ${issue.id}: status=${issue.status}, isOpen=${isOpen}`);
          return isOpen;
        });
      } else if (currentTab === 'closed') {
        filtered = filtered.filter(issue => issue.status === 'closed');
      }
      
      
      if (searchQuery) {
        filtered = filtered.filter(issue => {
          const searchText = `${issue.title} ${issue.description} ${issue.author} ${issue.labels.join(' ')}`.toLowerCase();
          return searchText.includes(searchQuery);
        });
      }
      
      console.log('Filtered count:', filtered.length);
      return filtered;
    }
